services:
  - type: web
    name: jarvis-claw
    env: node
    autoDeploy: true
    buildCommand: "curl -fsSL https://bun.sh/install | bash && export PATH=\"/root/.bun/bin:$PATH\" && npm install -g pnpm --force && pnpm install --frozen-lockfile && pnpm build && pnpm ui:install && pnpm ui:build"
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: AGENT_NAME
        value: Jarvis Claw
      - key: VERSION
        value: 1.0.0
      - key: PRIMARY_LLM
        value: gemini
      - key: MAX_TOKENS
        value: 8192
      - key: TEMPERATURE
        value: 0.7
      - key: AUTO_WEB_SEARCH
        value: true
      - key: WEB_SEARCH_CACHE_TTL
        value: 300
      - key: RATE_LIMIT_PER_MIN
        value: 10
      - key: PERSISTENT_DIR
        value: /tmp/.openclaw
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: CLAWHUB_TOKEN
        sync: false
